<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¿Quieres casarte conmigo?</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400;1,600&display=swap');

        :root {
            --bg: #06040c;
            --gold: #c9a84c;
            --gold-lt: #f0d98a;
            --rose: #d4607a;
            --rose-lt: #f0a0b4;
            --cream: #fdf6ee;
            --ball-r: #cc2010;
            --ball-rd: #7a1008;
            --ball-w: #f2ede8;
            --ball-wd: #c4bcb4;
            --expo: cubic-bezier(0.16, 1, 0.3, 1);
            --spring: cubic-bezier(0.34, 1.4, 0.64, 1);
            --smooth: cubic-bezier(0.4, 0, 0.2, 1);
        }

        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: var(--bg);
            font-family: 'Cormorant Garamond', serif;
            -webkit-font-smoothing: antialiased
        }

        body {
            cursor: none
        }

        #cur {
            position: fixed;
            z-index: 9999;
            pointer-events: none;
            width: 9px;
            height: 9px;
            border-radius: 50%;
            background: var(--rose-lt);
            box-shadow: 0 0 12px var(--rose), 0 0 26px var(--rose-lt);
            transform: translate(-50%, -50%);
            will-change: left, top
        }

        #sky,
        #hearts {
            position: fixed;
            inset: 0;
            pointer-events: none
        }

        #sky {
            z-index: 0
        }

        #hearts {
            z-index: 1
        }

        /* ── floating bg objects (pokeballs + pokemon) ── */
        .bg-layer {
            position: fixed;
            inset: 0;
            z-index: 2;
            pointer-events: none;
            overflow: hidden
        }

        .bg-obj {
            position: absolute;
            opacity: 0;
            animation: bg-float var(--bd) var(--bdel) ease-in-out infinite
        }

        @keyframes bg-float {
            0% {
                opacity: 0;
                transform: translateY(0) rotate(0deg) scale(1)
            }

            8% {
                opacity: var(--ba)
            }

            92% {
                opacity: var(--ba)
            }

            100% {
                opacity: 0;
                transform: translateY(var(--bty)) rotate(var(--br)) scale(.85)
            }
        }

        .scene {
            position: relative;
            z-index: 10;
            width: 100vw;
            height: 100vh;
            display: grid;
            place-items: center
        }

        .card {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 48px 64px 56px;
            background: rgba(8, 4, 16, 0.68);
            backdrop-filter: blur(34px) saturate(2);
            -webkit-backdrop-filter: blur(34px) saturate(2);
            border: 1px solid rgba(201, 168, 76, 0.16);
            border-radius: 4px;
            box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.03) inset,
                0 48px 100px rgba(0, 0, 0, 0.72),
                0 0 180px rgba(212, 96, 122, 0.09);
            opacity: 0;
            transform: translateY(20px);
            animation: card-in 1.2s 0.3s var(--expo) forwards;
            width: min(620px, 94vw);
        }

        @keyframes card-in {
            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        /* ── TEXT (bigger, Spanish) ── */
        .eyebrow {
            font-style: italic;
            font-weight: 300;
            font-size: clamp(13px, 1.8vw, 16px);
            letter-spacing: 7px;
            text-transform: uppercase;
            color: rgba(240, 160, 180, 0.48);
            margin-bottom: 16px;
            opacity: 0;
            animation: fade-up .8s .9s var(--expo) forwards
        }

        .rule {
            width: 100%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(201, 168, 76, .26) 30%, rgba(201, 168, 76, .26) 70%, transparent);
            margin-bottom: 36px;
            opacity: 0;
            animation: fade-in .8s 1s ease forwards
        }

        .stage {
            position: relative;
            width: 360px;
            height: 360px;
            flex-shrink: 0
        }

        .halo {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 380px;
            height: 380px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(204, 32, 16, .18) 0%, rgba(212, 96, 122, .07) 48%, transparent 70%);
            animation: halo-breathe 3.2s ease-in-out infinite;
            pointer-events: none
        }

        @keyframes halo-breathe {

            0%,
            100% {
                transform: translate(-50%, -50%) scale(.86);
                opacity: .5
            }

            50% {
                transform: translate(-50%, -50%) scale(1.14);
                opacity: 1
            }
        }

        /* ── POKEBALL ── */
        .ball-wrap {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 290px;
            height: 290px;
            cursor: pointer;
            filter: drop-shadow(0 14px 38px rgba(204, 32, 16, .54));
            transition: filter .35s ease;
            will-change: filter
        }

        .ball-wrap:hover:not(.opened) {
            filter: drop-shadow(0 16px 48px rgba(204, 32, 16, .88)) drop-shadow(0 0 88px rgba(212, 96, 122, .45))
        }

        .ball {
            width: 290px;
            height: 290px;
            position: relative
        }

        .ball-wrap:not(.opened) .ball {
            animation: idle-float 4s ease-in-out infinite
        }

        @keyframes idle-float {

            0%,
            100% {
                transform: translateY(0) rotate(0deg)
            }

            30% {
                transform: translateY(-10px) rotate(-2deg)
            }

            70% {
                transform: translateY(-5px) rotate(1.4deg)
            }
        }

        .ball-wrap:not(.opened):hover .ball {
            animation: hover-shake .55s ease-in-out
        }

        @keyframes hover-shake {

            0%,
            100% {
                transform: rotate(0deg) scale(1.04)
            }

            20% {
                transform: rotate(-11deg) scale(1.04)
            }

            40% {
                transform: rotate(11deg) scale(1.05)
            }

            60% {
                transform: rotate(-6deg) scale(1.04)
            }

            80% {
                transform: rotate(5deg) scale(1.04)
            }
        }

        .half {
            position: absolute;
            left: 0;
            width: 290px;
            height: 145px;
            overflow: hidden
        }

        .h-top {
            top: 0;
            transform-origin: 50% 100%
        }

        .h-bot {
            bottom: 0;
            transform-origin: 50% 0
        }

        .h-top .fill {
            width: 290px;
            height: 290px;
            border-radius: 50%;
            position: absolute;
            top: 0;
            left: 0;
            background: radial-gradient(ellipse 62% 56% at 30% 26%, #ff7252 0%, var(--ball-r) 50%, var(--ball-rd) 100%)
        }

        .h-bot .fill {
            width: 290px;
            height: 290px;
            border-radius: 50%;
            position: absolute;
            bottom: 0;
            left: 0;
            background: radial-gradient(ellipse 56% 52% at 66% 72%, #fffaf4 0%, var(--ball-w) 50%, var(--ball-wd) 100%)
        }

        .spec {
            position: absolute;
            pointer-events: none;
            border-radius: 50%;
            background: rgba(255, 255, 255, .32);
            filter: blur(9px)
        }

        .spec-a {
            top: 18px;
            left: 34px;
            width: 84px;
            height: 40px;
            transform: rotate(-28deg)
        }

        .spec-b {
            top: 54px;
            left: 96px;
            width: 34px;
            height: 15px;
            transform: rotate(-14deg);
            opacity: .52
        }

        .spec-c {
            top: 28px;
            left: 62px;
            width: 22px;
            height: 10px;
            transform: rotate(-20deg);
            opacity: .36;
            filter: blur(5px)
        }

        .band {
            position: absolute;
            top: 50%;
            left: 0;
            transform: translateY(-50%);
            width: 100%;
            height: 19px;
            background: #0a0a0a;
            z-index: 5
        }

        .band::after {
            content: '';
            position: absolute;
            top: 3px;
            left: 10%;
            width: 80%;
            height: 4px;
            background: rgba(255, 255, 255, .06);
            border-radius: 2px
        }

        .btn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 54px;
            height: 54px;
            border-radius: 50%;
            background: radial-gradient(circle at 36% 32%, #fff 0%, #e4e0da 52%, #b0a8a0 100%);
            border: 6px solid #0a0a0a;
            z-index: 10;
            box-shadow: 0 0 0 2px #0a0a0a, 0 0 14px rgba(255, 255, 255, .2);
            animation: btn-pulse 2.8s 2s ease-in-out infinite
        }

        @keyframes btn-pulse {

            0%,
            100% {
                box-shadow: 0 0 0 2px #0a0a0a, 0 0 12px rgba(255, 255, 255, .2), 0 0 28px rgba(201, 168, 76, .14)
            }

            50% {
                box-shadow: 0 0 0 2px #0a0a0a, 0 0 28px rgba(255, 255, 255, .62), 0 0 58px rgba(201, 168, 76, .5), 0 0 80px rgba(212, 96, 122, .26)
            }
        }

        /* open */
        .ball-wrap.opened .ball {
            animation: ball-pop .25s var(--spring) forwards
        }

        @keyframes ball-pop {
            0% {
                transform: scale(1)
            }

            50% {
                transform: scale(.87)
            }

            100% {
                transform: scale(1.08)
            }
        }

        .ball-wrap.opened .h-top {
            animation: split-t .95s .15s var(--smooth) forwards
        }

        .ball-wrap.opened .h-bot {
            animation: split-b .95s .15s var(--smooth) forwards
        }

        @keyframes split-t {
            0% {
                transform: translateY(0) rotateX(0deg);
                opacity: 1
            }

            62% {
                transform: translateY(-104px) rotateX(-24deg);
                opacity: 1
            }

            100% {
                transform: translateY(-220px) rotateX(-52deg);
                opacity: 0
            }
        }

        @keyframes split-b {
            0% {
                transform: translateY(0) rotateX(0deg);
                opacity: 1
            }

            62% {
                transform: translateY(104px) rotateX(24deg);
                opacity: 1
            }

            100% {
                transform: translateY(220px) rotateX(52deg);
                opacity: 0
            }
        }

        .ball-wrap.opened .band,
        .ball-wrap.opened .btn {
            animation: fade0 .2s .1s ease forwards
        }

        @keyframes fade0 {
            to {
                opacity: 0
            }
        }

        .e-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 290px;
            height: 290px;
            border-radius: 50%;
            transform: translate(-50%, -50%) scale(0);
            opacity: 0;
            pointer-events: none;
            border-style: solid
        }

        .e-ring:nth-child(1) {
            border-width: 1.5px;
            border-color: rgba(201, 168, 76, .8)
        }

        .e-ring:nth-child(2) {
            border-width: 1px;
            border-color: rgba(212, 96, 122, .55)
        }

        .e-ring:nth-child(3) {
            border-width: 1px;
            border-color: rgba(255, 255, 255, .2)
        }

        .ball-wrap.opened .e-ring:nth-child(1) {
            animation: e-ring 1s .28s ease-out forwards
        }

        .ball-wrap.opened .e-ring:nth-child(2) {
            animation: e-ring 1s .45s ease-out forwards
        }

        .ball-wrap.opened .e-ring:nth-child(3) {
            animation: e-ring 1s .62s ease-out forwards
        }

        @keyframes e-ring {
            0% {
                transform: translate(-50%, -50%) scale(.5);
                opacity: .9
            }

            100% {
                transform: translate(-50%, -50%) scale(5.2);
                opacity: 0
            }
        }

        .p-layer {
            position: absolute;
            top: 50%;
            left: 50%;
            pointer-events: none
        }

        .p {
            position: absolute;
            border-radius: 50%;
            opacity: 0;
            transform-origin: 0 0
        }

        .ball-wrap.opened .p {
            animation: p-fly var(--pt) var(--pd) var(--expo) forwards
        }

        @keyframes p-fly {
            0% {
                transform: rotate(var(--a)) translateX(2px) scale(1.1);
                opacity: 1
            }

            75% {
                opacity: .8
            }

            100% {
                transform: rotate(var(--a)) translateX(var(--dist)) scale(0);
                opacity: 0
            }
        }

        /* ── POKEMON CORNERS ── */
        .poke {
            position: absolute;
            pointer-events: none;
            z-index: 20;
            filter: drop-shadow(0 5px 14px rgba(0, 0, 0, .55))
        }

        .poke.pikachu {
            top: -18px;
            left: -18px;
            width: 112px;
            height: 112px;
            animation: poke-tl 3.8s ease-in-out infinite
        }

        .poke.eevee {
            top: -18px;
            right: -18px;
            width: 112px;
            height: 112px;
            animation: poke-tr 4.2s ease-in-out infinite
        }

        .poke.squirtle {
            bottom: -16px;
            left: -16px;
            width: 108px;
            height: 108px;
            animation: poke-bl 3.5s ease-in-out infinite
        }

        .poke.munchlax {
            bottom: -18px;
            right: -18px;
            width: 116px;
            height: 116px;
            animation: poke-br 4s ease-in-out infinite
        }

        @keyframes poke-tl {

            0%,
            100% {
                transform: translate(0, 0) rotate(-3deg)
            }

            50% {
                transform: translate(4px, -11px) rotate(2deg)
            }
        }

        @keyframes poke-tr {

            0%,
            100% {
                transform: translate(0, 0) rotate(3deg)
            }

            50% {
                transform: translate(-4px, -10px) rotate(-2deg)
            }
        }

        @keyframes poke-bl {

            0%,
            100% {
                transform: translate(0, 0) rotate(2deg)
            }

            50% {
                transform: translate(4px, -9px) rotate(-3deg)
            }
        }

        @keyframes poke-br {

            0%,
            100% {
                transform: translate(0, 0) rotate(-2deg)
            }

            50% {
                transform: translate(-5px, -12px) rotate(3deg)
            }
        }

        .stage.opened .poke {
            animation: poke-out .5s var(--expo) forwards !important
        }

        @keyframes poke-out {
            to {
                opacity: 0;
                transform: scale(.5) translateY(16px)
            }
        }

        /* ── RING ── */
        .ring-wrap {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -58%) scale(.5);
            opacity: 0;
            pointer-events: none;
            transform-origin: 50% 100%;
            will-change: transform, opacity
        }

        .ring-wrap.show {
            animation: ring-rise 1.1s .55s var(--spring) forwards
        }

        @keyframes ring-rise {
            0% {
                transform: translate(-50%, -58%) scale(.45) rotateX(20deg);
                opacity: 0
            }

            55% {
                opacity: 1
            }

            75% {
                transform: translate(-50%, -58%) scale(1.05) rotateX(-4deg)
            }

            100% {
                transform: translate(-50%, -58%) scale(1) rotateX(0deg);
                opacity: 1
            }
        }

        .ring-float {
            animation: ring-float 3.6s ease-in-out infinite
        }

        @keyframes ring-float {

            0%,
            100% {
                transform: translateY(0) rotate(-1.5deg)
            }

            50% {
                transform: translateY(-12px) rotate(1.5deg)
            }
        }

        .sp {
            position: absolute;
            font-size: var(--ss, 10px);
            color: var(--sc, #d6f0ff);
            text-shadow: 0 0 8px currentColor, 0 0 16px rgba(255, 255, 255, .6);
            opacity: 0;
            animation: sp-dance var(--sd) var(--sdl) ease-in-out infinite
        }

        @keyframes sp-dance {

            0%,
            100% {
                opacity: 0;
                transform: translate(0, 0) scale(.4)
            }

            40%,
            60% {
                opacity: 1;
                transform: translate(var(--sx), var(--sy)) scale(1)
            }
        }

        /* ── PROPOSAL (bigger text, Spanish) ── */
        .proposal {
            margin-top: 30px;
            text-align: center;
            opacity: 0;
            pointer-events: none
        }

        .proposal.show {
            animation: fade-up .9s var(--expo) forwards;
            pointer-events: all
        }

        .p-question {
            font-size: clamp(28px, 4.8vw, 42px);
            font-style: italic;
            font-weight: 300;
            color: var(--cream);
            letter-spacing: 2px;
            line-height: 1.15;
            text-shadow: 0 0 40px rgba(201, 168, 76, .4)
        }

        .p-sub {
            margin-top: 12px;
            font-size: clamp(12px, 1.6vw, 15px);
            font-style: italic;
            font-weight: 300;
            letter-spacing: 6px;
            text-transform: uppercase;
            color: rgba(240, 160, 180, .4)
        }

        .yes-btn {
            margin-top: 24px;
            padding: 15px 52px;
            background: transparent;
            border: 1px solid rgba(201, 168, 76, .48);
            border-radius: 1px;
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: clamp(16px, 2.2vw, 22px);
            letter-spacing: 5px;
            color: var(--gold-lt);
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: border-color .3s, box-shadow .3s
        }

        .yes-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(201, 168, 76, .1), rgba(212, 96, 122, .07));
            opacity: 0;
            transition: opacity .3s
        }

        .yes-btn:hover {
            border-color: rgba(201, 168, 76, .88);
            box-shadow: 0 0 26px rgba(201, 168, 76, .22), 0 0 50px rgba(212, 96, 122, .12)
        }

        .yes-btn:hover::before {
            opacity: 1
        }

        .hint {
            margin-top: 26px;
            font-size: clamp(11px, 1.4vw, 14px);
            font-style: italic;
            font-weight: 300;
            letter-spacing: 6px;
            text-transform: uppercase;
            color: rgba(240, 160, 180, .32);
            opacity: 0;
            transition: opacity .6s;
            animation: fade-in 1s 2s ease forwards, hint-breathe 4s 3s ease-in-out infinite
        }

        @keyframes hint-breathe {

            0%,
            100% {
                opacity: .32
            }

            50% {
                opacity: .62
            }
        }

        @keyframes fade-up {
            from {
                opacity: 0;
                transform: translateY(16px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        @keyframes fade-in {
            to {
                opacity: 1
            }
        }

        #flash {
            position: fixed;
            inset: 0;
            z-index: 800;
            pointer-events: none;
            background: #fffaf2;
            opacity: 0
        }

        #flash.go {
            animation: flash-anim .7s ease forwards
        }

        @keyframes flash-anim {
            0% {
                opacity: 0
            }

            30% {
                opacity: .9
            }

            100% {
                opacity: 0
            }
        }

        #curtain {
            position: fixed;
            inset: 0;
            z-index: 900;
            background: var(--bg);
            opacity: 0;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px
        }

        #curtain.go {
            pointer-events: all;
            animation: curtain-fade .9s .5s ease forwards
        }

        @keyframes curtain-fade {
            to {
                opacity: 1
            }
        }

        .c-ring {
            font-size: 56px;
            opacity: 0;
            animation: c-item .7s 1.4s var(--spring) forwards;
            filter: drop-shadow(0 0 20px rgba(201, 168, 76, .7))
        }

        .c-text {
            font-style: italic;
            font-size: clamp(22px, 3vw, 30px);
            font-weight: 300;
            color: var(--gold-lt);
            letter-spacing: 4px;
            opacity: 0;
            animation: c-item .7s 1.9s var(--expo) forwards
        }

        @keyframes c-item {
            from {
                opacity: 0;
                transform: translateY(14px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        /* ── BOTÓN DE MÚSICA ── */
        #musicBtn {
            position: fixed;
            bottom: 28px;
            right: 28px;
            z-index: 5000;
            width: 54px;
            height: 54px;
            border-radius: 50%;
            background: rgba(8, 4, 16, .78);
            border: 1px solid rgba(201, 168, 76, .35);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: border-color .3s, box-shadow .3s, transform .2s;
            box-shadow: 0 4px 22px rgba(0, 0, 0, .55);
        }

        #musicBtn:hover {
            border-color: rgba(201, 168, 76, .75);
            transform: scale(1.09);
            box-shadow: 0 4px 26px rgba(0, 0, 0, .6), 0 0 22px rgba(201, 168, 76, .22);
        }

        #musicBtn svg.ico {
            width: 22px;
            height: 22px;
            transition: opacity .25s;
            fill: var(--gold-lt);
        }

        #musicBtn .waves {
            display: flex;
            align-items: center;
            gap: 3px;
            opacity: 0;
            position: absolute;
            transition: opacity .28s;
        }

        #musicBtn.playing .ico {
            opacity: 0;
        }

        #musicBtn.playing .waves {
            opacity: 1;
        }

        .wb {
            width: 4px;
            border-radius: 2px;
            background: var(--gold);
            animation: wdance var(--wd) ease-in-out infinite alternate;
        }

        .wb:nth-child(1) {
            height: 10px;
            --wd: .60s
        }

        .wb:nth-child(2) {
            height: 19px;
            --wd: .45s;
            animation-delay: .10s
        }

        .wb:nth-child(3) {
            height: 14px;
            --wd: .55s;
            animation-delay: .20s
        }

        .wb:nth-child(4) {
            height: 21px;
            --wd: .50s;
            animation-delay: .05s
        }

        .wb:nth-child(5) {
            height: 10px;
            --wd: .65s;
            animation-delay: .15s
        }

        @keyframes wdance {
            from {
                transform: scaleY(.35);
                opacity: .55
            }

            to {
                transform: scaleY(1);
                opacity: 1
            }
        }

        #musicBtn.playing {
            animation: mring 2.4s ease-in-out infinite;
        }

        @keyframes mring {

            0%,
            100% {
                box-shadow: 0 4px 22px rgba(0, 0, 0, .55), 0 0 0 2px rgba(201, 168, 76, .42), 0 0 28px rgba(201, 168, 76, .18)
            }

            50% {
                box-shadow: 0 4px 22px rgba(0, 0, 0, .55), 0 0 0 4px rgba(201, 168, 76, .22), 0 0 46px rgba(201, 168, 76, .36)
            }
        }

        #musicBtn::after {
            content: attr(data-tip);
            position: absolute;
            right: 62px;
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: 13px;
            letter-spacing: 2px;
            color: var(--gold-lt);
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            background: rgba(8, 4, 16, .88);
            border: 1px solid rgba(201, 168, 76, .2);
            padding: 5px 14px;
            border-radius: 2px;
            backdrop-filter: blur(12px);
            transition: opacity .25s;
        }

        #musicBtn:hover::after {
            opacity: 1
        }
    </style>
</head>

    <script>
        /* cursor suavizado */
        const cur = document.getElementById('cur');
        let mx = 0, my = 0, cx = 0, cy = 0;
        document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY });
        (function lp() { cx += (mx - cx) * .16; cy += (my - cy) * .16; cur.style.left = cx + 'px'; cur.style.top = cy + 'px'; requestAnimationFrame(lp) })();

        /* cielo estrellado */
        (function () {
            const c = document.getElementById('sky'), ctx = c.getContext('2d');
            let W, H, st = [];
            function rs() {
                W = c.width = innerWidth; H = c.height = innerHeight; st = [];
                for (let i = 0; i < 210; i++)st.push({
                    x: Math.random() * W, y: Math.random() * H,
                    r: Math.random() * 1.5 + .15, a: Math.random(), da: (Math.random() - .5) * .006,
                    h: [350, 42, 210, 270][Math.floor(Math.random() * 4)]
                })
            }
            addEventListener('resize', rs); rs();
            function dr() {
                ctx.clearRect(0, 0, W, H);
                [[W * .35, H * .38, W * .52, .14, 290], [W * .68, H * .58, W * .42, .10, 345], [W * .5, H * .5, W * .3, .06, 42]]
                    .forEach(([x, y, r, a, h]) => {
                        const g = ctx.createRadialGradient(x, y, 0, x, y, r);
                        g.addColorStop(0, `hsla(${h},65%,38%,${a})`); g.addColorStop(1, 'transparent');
                        ctx.fillStyle = g; ctx.fillRect(0, 0, W, H)
                    });
                st.forEach(s => {
                    s.a += s.da; if (s.a > 1) { s.a = 1; s.da *= -1 } if (s.a < 0) { s.a = 0; s.da *= -1 }
                    ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
                    ctx.fillStyle = `hsla(${s.h},72%,90%,${s.a})`; ctx.fill()
                });
                requestAnimationFrame(dr)
            } dr()
        })();

        /* corazones y pétalos */
        (function () {
            const c = document.getElementById('hearts'), ctx = c.getContext('2d');
            let W, H, it = [];
            function rs() { W = c.width = innerWidth; H = c.height = innerHeight }
            addEventListener('resize', rs); rs();
            function sp() {
                if (it.length > 32) return; const h = Math.random() > .42;
                it.push({
                    x: Math.random() * W, y: H + 16, sz: Math.random() * 11 + 4,
                    vx: (Math.random() - .5) * .5, vy: -(Math.random() * .4 + .17),
                    rot: Math.random() * Math.PI * 2, vr: (Math.random() - .5) * .014,
                    a: Math.random() * .27 + .06, isHeart: h, hue: h ? 336 + Math.random() * 20 : 34 + Math.random() * 18
                })
            }
            setInterval(sp, 360);
            function hp(ctx, x, y, s) {
                const k = s * .038; ctx.save(); ctx.translate(x, y); ctx.scale(k, k);
                ctx.beginPath(); ctx.moveTo(0, -6); ctx.bezierCurveTo(0, -10, -7, -10, -7, -4);
                ctx.bezierCurveTo(-7, 0, 0, 5, 0, 9); ctx.bezierCurveTo(0, 5, 7, 0, 7, -4);
                ctx.bezierCurveTo(7, -10, 0, -10, 0, -6); ctx.closePath(); ctx.restore()
            }
            function dr() {
                ctx.clearRect(0, 0, W, H); it = it.filter(p => p.y > -40);
                it.forEach(p => {
                    p.x += p.vx + Math.sin(Date.now() * .0007 + p.y * .01) * .26; p.y += p.vy; p.rot += p.vr;
                    ctx.save(); ctx.globalAlpha = p.a;
                    if (p.isHeart) { ctx.fillStyle = `hsl(${p.hue},78%,65%)`; hp(ctx, p.x, p.y, p.sz); ctx.fill() }
                    else {
                        ctx.translate(p.x, p.y); ctx.rotate(p.rot); ctx.fillStyle = `hsl(${p.hue},65%,68%)`;
                        ctx.beginPath(); ctx.ellipse(0, 0, p.sz * .28, p.sz, .3, 0, Math.PI * 2); ctx.fill()
                    }
                    ctx.restore()
                }); requestAnimationFrame(dr)
            } dr()
        })();

                /* Munchlax mini */
                `<svg viewBox="0 0 60 60" fill="none"><circle cx="30" cy="36" r="22" fill="#3858a8"/><ellipse cx="30" cy="40" rx="15" ry="14" fill="#f0d888"/><polygon points="10,22 4,4 22,14" fill="#3050a0"/><polygon points="12,21 8,7 20,14" fill="#8090cc"/><polygon points="50,22 56,4 38,14" fill="#3050a0"/><polygon points="48,21 52,7 40,14" fill="#8090cc"/><circle cx="30" cy="24" r="18" fill="#3858a8"/><ellipse cx="30" cy="28" rx="14" ry="12" fill="#4870c0"/><ellipse cx="20" cy="23" rx="6" ry="5.5" fill="white"/><ellipse cx="40" cy="23" rx="6" ry="5.5" fill="white"/><path d="M14 23 Q20 18 26 23" fill="#3858a8"/><path d="M34 23 Q40 18 46 23" fill="#3858a8"/><ellipse cx="20" cy="25" rx="4" ry="3" fill="#111"/><ellipse cx="40" cy="25" rx="4" ry="3" fill="#111"/><circle cx="18" cy="23" r="1.8" fill="white"/><circle cx="38" cy="23" r="1.8" fill="white"/><ellipse cx="30" cy="31" rx="2.8" ry="2" fill="#2848a0"/><path d="M22 37 Q30 45 38 37" stroke="#2848a0" stroke-width="1.8" fill="none" stroke-linecap="round"/><circle cx="18" cy="36" r="2" fill="#f0d888"/><circle cx="42" cy="36" r="2" fill="#f0d888"/></svg>`,
                /* Charmander mini */
                `<svg viewBox="0 0 60 60" fill="none"><ellipse cx="52" cy="48" rx="5" ry="8" fill="#f06820" transform="rotate(20,52,48)"/><circle cx="54" cy="42" r="5" fill="#ff4800" opacity=".8"/><circle cx="54" cy="41" r="3" fill="#ff9000" opacity=".7"/><circle cx="54" cy="40" r="1.5" fill="#ffe000" opacity=".8"/><circle cx="30" cy="32" r="18" fill="#f87820"/><ellipse cx="30" cy="36" rx="22" ry="16" fill="#f87820"/><ellipse cx="30" cy="40" rx="14" ry="11" fill="#ffd090"/><ellipse cx="20" cy="24" rx="4" ry="5" fill="#111"/><ellipse cx="40" cy="24" rx="4" ry="5" fill="#111"/><ellipse cx="21" cy="23" rx="1.8" ry="2.2" fill="white"/><ellipse cx="41" cy="23" rx="1.8" ry="2.2" fill="white"/><ellipse cx="30" cy="29" rx="1.5" ry="1" fill="#c05000"/><path d="M24 33 Q30 39 36 33" stroke="#c05000" stroke-width="1.5" fill="none" stroke-linecap="round"/><ellipse cx="18" cy="30" rx="4" ry="3" fill="#f0a060" opacity=".6"/><ellipse cx="42" cy="30" rx="4" ry="3" fill="#f0a060" opacity=".6"/></svg>`,
                /* Jigglypuff mini */
                `<svg viewBox="0 0 60 60" fill="none"><circle cx="30" cy="30" r="24" fill="#ffb0c8"/><ellipse cx="16" cy="20" rx="5" ry="7" fill="#ff90b0"/><ellipse cx="44" cy="20" rx="5" ry="7" fill="#ff90b0"/><circle cx="20" cy="26" r="7" fill="#60c0e8"/><circle cx="40" cy="26" r="7" fill="#60c0e8"/><circle cx="20" cy="26" r="5" fill="#1a1a2e"/><circle cx="40" cy="26" r="5" fill="#1a1a2e"/><circle cx="18" cy="24" r="2.2" fill="white"/><circle cx="38" cy="24" r="2.2" fill="white"/><ellipse cx="30" cy="33" rx="1.8" ry="1.2" fill="#e06090"/><path d="M24 37 Q30 43 36 37" stroke="#e06090" stroke-width="1.5" fill="none" stroke-linecap="round"/><ellipse cx="18" cy="36" rx="5" ry="3.5" fill="#ff90b0" opacity=".6"/><ellipse cx="42" cy="36" rx="5" ry="3.5" fill="#ff90b0" opacity=".6"/><path d="M28 14 Q30 10 32 14" stroke="#e06090" stroke-width="2" fill="none" stroke-linecap="round"/></svg>`,
            ];

            /* Pokébolas de distintos tipos */
            const ballTypes = [
                ['#cc2010', '#111', '#f2ede8', '#e8e4e0'],

                { l: '8%', t: '84%' }, { l: '88%', t: '82%' }, { l: '20%', t: '4%' }, { l: '76%', t: '6%' },

        /* trail del mouse */

        document.addEventListener('mousemove', e => {
            if (Date.now() - lt < 110) return; lt = Date.now(); if (Math.random() > .58) return;
            const el = document.createElement('div'); el.textContent = Math.random() > .5 ? '♥' : '·';
            el.style.cssText = `position:fixed;pointer-events:none;z-index:8999;left:${e.clientX}px;top:${e.clientY}px;color:hsl(${Math.random() > .5 ? 344 : 42},82%,70%);font-size:${8 + Math.random() * 9}px;animation:trl .72s ease forwards;transform:translate(-50%,-50%);text-shadow:0 0 6px currentColor;`;
            document.body.appendChild(el); setTimeout(() => el.remove(), 760)
        });

        /* partículas */
        const pLayer = document.getElementById('pLayer');
        const pc = ['#c9a84c', '#f0d98a', '#d4607a', '#f0a0b4', '#fff', '#d6f0ff', '#ffe870'];
        for (let i = 0; i < 38; i++) {
            const p = document.createElement('div'); p.className = 'p';
            const a = (i / 38) * 360, d = 120 + Math.random() * 130, s = 3 + Math.random() * 9;
            p.style.cssText = `--a:${a}deg;--dist:${d}px;--pt:${.6 + Math.random() * .5}s;--pd:${.25 + Math.random() * .4}s;background:${pc[i % pc.length]};width:${s}px;height:${s}px;box-shadow:0 0 ${s + 2}px ${pc[i % pc.length]};`;
            pLayer.appendChild(p)
        }

        /* abrir */
        let opened = false;
        function openBall() {
            if (opened) return; opened = true;
            document.getElementById('hint').style.opacity = '0';
            document.getElementById('stage').classList.add('opened');
            document.getElementById('ballWrap').classList.add('opened');
            setTimeout(() => document.getElementById('ringWrap').classList.add('show'), 550);
            setTimeout(() => document.getElementById('proposal').classList.add('show'), 2000);
        }
        function sayYes() {
            document.getElementById('flash').classList.add('go');
            setTimeout(() => {
                document.getElementById('curtain').classList.add('go');
                setTimeout(() => { window.location.href = 'TU_URL_AQUI' }, 2500)
            }, 430);
        }

        /* ── MÚSICA ── */
        (function () {
            const audio = document.getElementById('bgMusic');
            const btn = document.getElementById('musicBtn');
            let playing = false;

            audio.volume = 0.28;

            function play() {
                audio.play().then(() => {
                    playing = true;
                    btn.classList.add('playing');
                    btn.setAttribute('data-tip', 'Pausar');
                }).catch(() => { });
            }
            function pause() {
                audio.pause();
                playing = false;
                btn.classList.remove('playing');
                btn.setAttribute('data-tip', 'Reproducir');
            }

            /* Autoplay al cargar — el navegador puede bloquearlo hasta el primer click */
            window.addEventListener('load', () => { play(); });

            /* Si el autoplay fue bloqueado, arranca en el primer clic en cualquier parte */
            document.addEventListener('click', () => {
                if (!playing) { play(); }
            }, { once: true });

            /* Toggle del botón */
            btn.addEventListener('click', e => {
                e.stopPropagation();
                playing ? pause() : play();
            });

            /* Pausar cuando el usuario sale de la pestaña / ventana */
            document.addEventListener('visibilitychange', () => {
                if (document.hidden) { pause(); }
                else if (!playing) { play(); }
            });
        })();
    </script>
</body>

</html>
